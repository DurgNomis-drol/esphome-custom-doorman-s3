# Doorman Standard Firmware (Home Assistant)
# Base Board ESP32

# You can change a few options here.
substitutions:
  name: "doorman-s3"
  friendly_name: "Porttelefon"

esp32:
  variant: ESP32

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

logger:

api:
  encryption:
    key: !secret doorman_s3__encryption_key

ota:
    - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name} fallback AP

captive_portal:
  
external_components:
  - source: github://azoninc/doorman@master
    components: [ tc_bus, tc_bus_device ]

## RMT configuration
remote_receiver:
  pin:
    number: GPIO14
    mode: INPUT
  filter: 1500us
  idle: 7000us

remote_transmitter:
  pin:
    number: GPIO12
    mode: OUTPUT
  carrier_duty_percent: 100%

# TC:BUS configuration
tc_bus:
  id: my_tc_bus
  on_telegram:
    - logger.log: "Received telegram from bus!"

# TC:BUS Device configuration
tc_bus_device:
  - id: my_tc_bus_indoor_station_device
    type: indoor_station
    auto_configuration: true
    on_read_memory_complete:
      - lambda: |-
          std::string hexString = str_upper_case(format_hex(x));
          ESP_LOGI("tc_bus", "Memory reading completed. Data: %s", hexString.c_str());
    on_read_memory_timeout:
      - logger.log:
          format: "Memory reading timed out! No memory block received in time."
          level: ERROR
    on_identify_complete:
      - logger.log:
          format: "Identified Hardware: %s (v%i) | Firmware: %i.%i.%i"
          args: [ 'model_to_string(x.model)', 'x.hardware_version', 'x.firmware_major', 'x.firmware_minor', 'x.firmware_patch' ]
          level: INFO
    on_identify_unknown:
      - logger.log: "Setup: Unable to identify the Indoor Station, unknown model."
    on_identify_timeout:
      - logger.log:
          format: "Failed to identify the Indoor Station. Please select it manually."
          level: ERROR

number:
  - platform: tc_bus_device
    tc_bus_device_id: my_tc_bus_indoor_station_device
    serial_number:
      name: "Serial Number"
    volume_ringtone:
      name: "Volume ringklokke"
    volume_handset_door_call:
      name: "Volume opkald"
      icon: "mdi:phone-in-talk"

switch:
  - platform: tc_bus_device
    tc_bus_device_id: my_tc_bus_indoor_station_device
    ringtone_mute:
      name: "Ringeklokke lydløs"
      icon: "mdi:volume-off"
  - platform: template
    entity_category: config
    name: "Ring-to-open"
    id: ring_to_open
    optimistic: true
  - platform: template
    name: "Mønster"
    entity_category: config
    icon: "mdi:lock-pattern"
    id: pattern
    optimistic: true

text_sensor:
  - platform: tc_bus
    tc_bus_id: my_tc_bus
    bus_telegram:
      name: "Last Bus Telegram"

# Binary sensor for doorbell press
binary_sensor:
  - platform: tc_bus
    id: entrance_doorbell_raw
    internal: true
    telegram: 0x0443BB81
    on_press:
      then:
        - if:
            condition:
              lambda: return id(ring_to_open).state == true;
            then:
              - lock.unlock: entrance_door
              - event.trigger:
                  id: outdoor_station
                  event_type: ring_to_open
              - logger.log: "Ring-to-open is enabled. Door is open!"
            else:
              - event.trigger:
                  id: outdoor_station
                  event_type: ring
    on_multi_click: 
      # Special Pattern
      - timing: 
          - ON for at most 0.5s
          - OFF for at most 1s

          - ON for at most 0.5s
          - OFF for at most 1s

          - ON for at most 0.5s
          - OFF for at least 1.7s
        then: 
          - if:
              condition:
                lambda: return id(pattern).state == true;
              then:
                - lock.unlock: entrance_door
                - event.trigger:
                    id: outdoor_station
                    event_type: pattern
                - logger.log: "Pattern is enabled. Door is open!"
          
  - platform: tc_bus
    id: entrance_door_unlocked
    internal: true
    telegram: 0x00002101
    on_press:
      then:
        - event.trigger:
            id: outdoor_station
            event_type: door_unlocked
  - platform: tc_bus
    id: entrance_door_locked
    internal: true
    telegram: 0x00002101
    on_press:
      then:
        - lock.lock: entrance_door
  - platform: tc_bus
    id: entrance_door_light
    internal: true
    telegram: 0x00001201
    on_press:
      then:
        - event.trigger:
            id: indoor_station
            event_type: light
  - platform: tc_bus
    id: entrance_door_func
    internal: true
    telegram: 0x6443BB08
    on_press:
      then:
        - event.trigger:
            id: indoor_station
            event_type: button
    
          
event:
  - platform: template
    name: None
    device_class: "doorbell"
    id: outdoor_station
    event_types:
      - "ring"
      - "door_unlocked"
      - "ring_to_open"
      - "pattern"
      - "ha"
  - platform: template
    name: "Telefon"
    icon: "mdi:deskphone"
    id: indoor_station
    event_types:
      - "light"
      - "button"

lock:
  - platform: template
    name: "Opgangsdør"
    id: entrance_door
    optimistic: true
    unlock_action:
      then:
        - tc_bus.send:
            telegram: 0x1443BB81
        - event.trigger:
            id: outdoor_station
            event_type: ha
        - wait_until:
            condition:
              binary_sensor.is_on: entrance_door_locked
            timeout: 15s
        - lock.lock: entrance_door
            
# Sending telegrams
button:
  - platform: tc_bus_device
    tc_bus_device_id: my_tc_bus_indoor_station_device
    read_memory:
      name: "Læs hukommelse"
  - platform: template
    internal: true
    id: entrance_door_btn
    on_press:
      then:
        - lock.unlock: entrance_door